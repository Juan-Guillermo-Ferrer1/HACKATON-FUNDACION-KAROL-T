name: Registro de Participantes

on:
  issues:
    types: [opened, edited, closed]

jobs:
  registro:
    if: startsWith(github.event.issue.title, '[INSCRIPCIÓN]') || startsWith(github.event.issue.title, '[inscripcion]') || startsWith(github.event.issue.title, '[Inscripcion]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      ACTION: ${{ github.event.action }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract participant data and update JSON
        run: |
          printf '%s' "${{ github.event.issue.body }}" > /tmp/issue_body.txt
          
          python3 << 'EOF'
          import json
          import os
          from pathlib import Path

          body = Path("/tmp/issue_body.txt").read_text()
          title = "${{ github.event.issue.title }}"
          action = "${{ github.event.action }}"

          equipo = title.replace('[INSCRIPCIÓN] - ', '').replace('[inscripcion] - ', '').replace('[Inscripcion] - ', '').strip()
          
          print(f"=== DEBUG ===")
          print(f"Titulo: {title}")
          print(f"Equipo extraido: {equipo}")
          print(f"Primeras lineas del cuerpo:")
          for i, line in enumerate(body.split('\n')[:15]):
            print(f"  {i}: '{line}'")

          filepath = 'Participantes/participantes.json'
          existing = []
          if os.path.exists(filepath):
            with open(filepath, 'r') as f:
              existing = json.load(f)

          # Si el issue se cierra, eliminar participante
          if action == 'closed':
            existing = [p for p in existing if p.get('equipo', '').lower() != equipo.lower()]
            print(f"Participante eliminado: {equipo}")
          else:
            # Agregar o actualizar participante
            nombre_integrantes = []
            correo = ''
            institucion = ''
            edades = ''
            skills = ''
            categoria = ''
            experiencia = ''

            lines = body.split('\n')
            data = {
                'equipo': equipo,
                'integrantes': [],
                'correo': '',
                'institucion': '',
                'edades': '',
                'skills': '',
                'categoria': '',
                'experiencia': ''
            }
            
            field_mapping = {
                'Nombre del Equipo': 'equipo',
                'Integrantes': 'integrantes',
                'Nombre de los Integrantes': 'integrantes',
                'Correo': 'correo',
                'Correo de contacto': 'correo',
                'Institución': 'institucion',
                'Institución / Colegio / Universidad': 'institucion',
                'Edades': 'edades',
                'Edades de los integrantes': 'edades',
                'Skills': 'skills',
                'Skills / Conocimientos': 'skills',
                'Categoría': 'categoria',
                'Categoría de participación': 'categoria',
                'Experiencia': 'experiencia',
                '¿Ya tienes experiencia programando?': 'experiencia'
            }
            
            current_field = None
            for line in lines:
                line = line.strip()
                if not line:
                    continue
                # Detect section headers
                matched = False
                for field_name, field_key in field_mapping.items():
                    if line == f'## {field_name}' or line == f'## {field_name}\r':
                        current_field = field_key
                        matched = True
                        break
                if matched:
                    continue
                # Skip separator lines and footnotes
                if line.startswith('---') or line.startswith('*') or line.startswith('- [ ]'):
                    continue
                # Parse checkbox (from manual issue template)
                if line.startswith('- [x]'):
                    value = line.replace('- [x]', '').strip()
                    if current_field in ['categoria', 'experiencia']:
                        data[current_field] = value
                elif current_field:
                    if current_field == 'integrantes':
                        data['integrantes'].append(line)
                    else:
                        data[current_field] = line
            
            nombre_integrantes = data['integrantes']
            correo = data['correo']
            institucion = data['institucion']
            edades = data['edades']
            skills = data['skills']
            categoria = data['categoria']
            experiencia = data['experiencia']

            data = {
              'equipo': equipo,
              'integrantes': nombre_integrantes,
              'correo': correo,
              'institucion': institucion,
              'edades': edades,
              'skills': skills,
              'categoria': categoria,
              'experiencia': experiencia,
              'fecha_inscripcion': '${{ github.event.issue.created_at }}',
              'issue_url': '${{ github.event.issue.html_url }}'
            }

            existing = [p for p in existing if p.get('equipo', '').lower() != equipo.lower()]
            existing.append(data)
            print(f"TITULO RECIBIDO: {title}")
            print(f"CUERPO RECIBIDO: {body[:200]}...")
            print(f"Participante registrado: {equipo}")

          with open(filepath, 'w') as f:
            json.dump(existing, f, indent=2, ensure_ascii=False)

          # Read current busco data
          busco_data = []
          try:
            with open('Participantes/busco-equipo.json', 'r') as f:
              busco_data = json.load(f)
          except:
            busco_data = []

          # Generate teams table
          equipos_table = "| # | Equipo | Integrantes | Institución | Edades | Skills | Correo | Categoría | Experiencia | Fecha |\n|---|--------|-------------|-------------|--------|--------|--------|-----------|-------------|-------|\n"
          for i, p in enumerate(existing):
            integrantes = ', '.join(p.get('integrantes', []))
            fecha = p.get('fecha_inscripcion', '')[:10]
            equipos_table += f"| {i+1} | {p.get('equipo', '')} | {integrantes} | {p.get('institucion', '')} | {p.get('edades', '')} | {p.get('skills', '')} | {p.get('correo', '')} | {p.get('categoria', '')} | {p.get('experiencia', '')} | {fecha} |\n"

          equipos_table += "\n*Esta lista se actualiza automáticamente cuando un equipo se registra mediante un issue.*\n"

          # Generate busco table
          busco_table = "| # | Nombre | Tipo | Rol | Skills | Institución | Edad | Correo |\n|---|--------|------|-----|--------|-------------|------|--------|\n"
          for i, p in enumerate(busco_data):
            tipo_texto = '🔽 Busca equipo' if p.get('tipo') == 'equipo' else '🔼 Tiene equipo'
            busco_table += f"| {i+1} | {p.get('nombre', '')} | {tipo_texto} | {p.get('rol', '')} | {p.get('skills', '')} | {p.get('institucion', '')} | {p.get('edad', '')} | {p.get('correo', '')} |\n"

          busco_table += "\n## 📝 Descripciones Detalladas\n\n### Descripciones de quienes buscan equipo:\n\n"
          for p in busco_data:
            if p.get('descripcion'):
              busco_table += f"### {p.get('nombre', '')}\n{p.get('descripcion', '')}\n\n"

          busco_table += "*Esta lista se actualiza automáticamente. Para contactar, usa el correo proporcionado.*\n"

          # Generate complete README
          readme_content = '# 👥 Participantes del Hackatón\n\n'
          readme_content += 'Esta página contiene las listas actualizadas de **equipos inscritos** y **personas buscando compañeros** para el Hackatón.\n\n'
          readme_content += '---\n\n'
          readme_content += '## 🏆 Equipos Inscritos\n\n'
          readme_content += equipos_table
          readme_content += '\n---\n\n'
          readme_content += '## 🤝 Busco Compañeros\n\n'
          readme_content += busco_table
          readme_content += '\n---\n\n'
          readme_content += '## 📋 ¿Cómo aparecen aquí?\n\n'
          readme_content += '- **Equipos inscritos**: Se registran desde la página web del Hackatón\n'
          readme_content += '- **Busco compañeros**: Se publican desde la pestaña "Busco Compañeros" de la página web\n\n'
          readme_content += '**¿Quieres inscribirte o buscar compañeros?** Visita: [página del Hackatón](https://juan-guillermo-ferrer1.github.io/HACKATON-FUNDACION-PROMITIERRA/)\n\n'
          readme_content += '---\n\n'
          readme_content += '*Fundación ProMiTierra - Innovación con Sentido Humano*\n'

          with open('Participantes/README.md', 'w') as f:
            f.write(readme_content)

          print(f"Total participantes: {len(existing)}")
          EOF



      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add Participantes/participantes.json Participantes/README.md
          git diff --staged --quiet || git commit -m "Actualizar participante de issue #${{ github.event.issue.number }}"
          git push