name: Registro de Participantes

on:
  issues:
    types: [opened, edited, closed]

jobs:
  registro:
    if: startsWith(github.event.issue.title, '[INSCRIPCIÓN]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      ACTION: ${{ github.event.action }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract participant data and update JSON
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ACTION: ${{ github.event.action }}
        run: |
          python3 << 'EOF'
          import json
          import os
          import re

          body = os.environ.get('ISSUE_BODY', '')
          title = os.environ.get('ISSUE_TITLE', '')
          action = os.environ.get('ACTION', '')

          equipo = title.replace('[INSCRIPCIÓN] - ', '').strip()

          filepath = 'Participantes/participantes.json'
          existing = []
          if os.path.exists(filepath):
            with open(filepath, 'r') as f:
              existing = json.load(f)

          # Si el issue se cierra, eliminar participante
          if action == 'closed':
            existing = [p for p in existing if p.get('equipo', '').lower() != equipo.lower()]
            print(f"Participante eliminado: {equipo}")
          else:
            # Agregar o actualizar participante
            nombre_integrantes = []
            correo = ''
            institucion = ''
            edades = ''
            skills = ''
            categoria = ''
            experiencia = ''

            lines = body.split('\n')
            current_field = None

            for i, line in enumerate(lines):
                line_stripped = line.strip()
                
                if '## Nombre del Equipo' in line:
                    current_field = 'equipo'
                elif '## Integrantes' in line:
                    current_field = 'integrantes'
                elif '## Correo' in line:
                    current_field = 'correo'
                elif '## Institución' in line or '## Colegio' in line:
                    current_field = 'institucion'
                elif '## Edades' in line:
                    current_field = 'edades'
                elif '## Skills' in line:
                    current_field = 'skills'
                elif '## Categoría' in line:
                    current_field = 'categoria'
                elif '## Experiencia' in line:
                    current_field = 'experiencia'
                elif line_stripped and not line_stripped.startswith('#') and not line_stripped.startswith('-'):
                    if current_field == 'integrantes' and line_stripped:
                        nombre_integrantes.append(line_stripped)
                    elif current_field == 'correo' and '@' in line_stripped:
                        correo = line_stripped
                    elif current_field == 'institucion':
                        institucion = line_stripped
                    elif current_field == 'edades' and line_stripped:
                        edades = line_stripped
                    elif current_field == 'skills' and line_stripped:
                        skills = line_stripped
                    elif current_field == 'categoria' and line_stripped:
                        categoria = line_stripped
                    elif current_field == 'experiencia' and line_stripped:
                        experiencia = line_stripped
                  elif current_field == 'correo' and '@' in line_stripped:
                    correo = line_stripped
                  elif current_field == 'institucion':
                    institucion = line_stripped
                  elif current_field == 'edades':
                    if line_stripped and not line_stripped.startswith('('):
                      if edades:
                        edades += ', ' + line_stripped
                      else:
                        edades = line_stripped
                  elif current_field == 'skills':
                    if line_stripped and not line_stripped.startswith('('):
                      if skills:
                        skills += ', ' + line_stripped
                      else:
                        skills = line_stripped

            data = {
              'equipo': equipo,
              'integrantes': nombre_integrantes,
              'correo': correo,
              'institucion': institucion,
              'edades': edades,
              'skills': skills,
              'categoria': categoria,
              'experiencia': experiencia,
              'fecha_inscripcion': '${{ github.event.issue.created_at }}',
              'issue_url': '${{ github.event.issue.html_url }}'
            }

            existing = [p for p in existing if p.get('equipo', '').lower() != equipo.lower()]
            existing.append(data)
            print(f"Participante registrado: {equipo}")

          with open(filepath, 'w') as f:
            json.dump(existing, f, indent=2, ensure_ascii=False)

          readme_content = "# Participantes Registrados\n\n| # | Equipo | Integrantes | Institucion | Edades | Skills | Correo | Categoria | Experiencia | Fecha |\n|---|--------|-------------|-------------|--------|--------|--------|-----------|-------------|-------|\n"
          for i, p in enumerate(existing):
            integrantes = ', '.join(p.get('integrantes', []))
            fecha = p.get('fecha_inscripcion', '')[:10]
            readme_content += f"| {i+1} | {p.get('equipo', '')} | {integrantes} | {p.get('institucion', '')} | {p.get('edades', '')} | {p.get('skills', '')} | {p.get('correo', '')} | {p.get('categoria', '')} | {p.get('experiencia', '')} | {fecha} |\n"

          readme_content += "\n*Esta lista se actualiza automaticamente cuando un participante se registra mediante un issue.*\n"

          with open('Participantes/README.md', 'w') as f:
            f.write(readme_content)

          print(f"Total participantes: {len(existing)}")
          EOF

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add Participantes/participantes.json Participantes/README.md
          git diff --staged --quiet || git commit -m "Actualizar participante de issue #${{ github.event.issue.number }}"
          git push